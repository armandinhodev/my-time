<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fondo circular con gradiente -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Círculo de fondo -->
  <circle cx="16" cy="16" r="14" fill="url(#grad)"/>
  
  <!-- Reloj estilizado -->
  <circle cx="16" cy="16" r="10" stroke="white" stroke-width="2" fill="none"/>
  <line x1="16" y1="16" x2="16" y2="10" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="20" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Check mark de progreso -->
  <path d="M22 8 L24 6 L26 8" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>