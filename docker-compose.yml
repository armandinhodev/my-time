version: '3.9'

services:
  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: mytime-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: mytime
    volumes:
      - mongo_data:/data/db
    networks:
      - mytime-network

  # Backend API (NestJS)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mytime-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/mytime
      JWT_ACCESS_SECRET: mytime-access-secret-key-change-in-production
      JWT_REFRESH_SECRET: mytime-refresh-secret-key-change-in-production
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      COOKIE_NAME: mytime_refresh
      COOKIE_DOMAIN: localhost
      COOKIE_SECURE: 'false'
      CORS_ORIGIN: http://localhost,http://localhost:80,http://localhost:5173
    depends_on:
      - mongo
    networks:
      - mytime-network

  # Frontend (React + Vite + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mytime-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - mytime-network

volumes:
  mongo_data:

networks:
  mytime-network:
    driver: bridge
